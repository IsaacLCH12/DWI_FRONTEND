<div class="modal-overlay" *ngIf="visible">
  <div class="modal-content">
    <div class="modal-icon">⚠️</div>
    <h3>{{ titulo }}</h3>
    <p>{{ mensaje }}</p>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="onCancelar.emit()">{{ textoCancelar }}</button>
      <button class="btn-confirm" (click)="onConfirmar.emit()">{{ textoConfirmar }}</button>
    </div>
  </div>
</div>
