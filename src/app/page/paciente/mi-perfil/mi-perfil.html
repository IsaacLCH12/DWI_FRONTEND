<app-navbar></app-navbar>

<div class="paciente-container">
  <div class="perfil-card">
    <h2>Mi Información Personal</h2>

    <div *ngIf="cargando" class="loading-msg" style="text-align: center; color: #64748b; padding: 2rem;">
      ⏳ Cargando tu información...
    </div>

    <div *ngIf="!cargando && mensajeError && !pacienteId" class="error-banner">⚠️ {{ mensajeError }}</div>

    <form *ngIf="!cargando && usuarioId" (ngSubmit)="actualizar()" class="form-step">
      <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="perfil.nombre" name="nombre" placeholder="Tu nombre" class="form-control">
        </div>
        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
          <label>Apellido</label>
          <input type="text" [(ngModel)]="perfil.apellido" name="apellido" placeholder="Tu apellido" class="form-control">
        </div>
      </div>

      <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
        <label>DNI</label>
        <input type="text" [(ngModel)]="perfil.dni" name="dni" placeholder="Tu número de DNI" class="form-control" maxlength="8">
      </div>

      <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="perfil.correo" name="correo" placeholder="Tu correo" class="form-control">
      </div>

      <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
        <label>Teléfono</label>
        <input type="text" [(ngModel)]="perfil.telefono" name="telefono" placeholder="987654321" class="form-control">
      </div>

      <div class="error-banner" *ngIf="mensajeError" style="margin-top: 1rem;">⚠️ {{ mensajeError }}</div>
      <div class="success-banner" *ngIf="mensajeExito" style="margin-top: 1rem;">{{ mensajeExito }}</div>

      <button type="submit" class="btn-blue" [disabled]="guardando" style="margin-top: 1.5rem; width: 100%;">
        {{ guardando ? 'Guardando...' : 'Actualizar Datos' }}
      </button>
    </form>
  </div>
</div>
