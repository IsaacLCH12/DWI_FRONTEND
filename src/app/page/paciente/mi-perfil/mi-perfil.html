<app-navbar></app-navbar>
<div class="perfil-page">
  <div class="perfil-card">
    <h2>Mi Información Personal</h2>

    <div *ngIf="cargando" class="loading-msg">⏳ Cargando tu información...</div>

    <div *ngIf="!cargando && mensajeError && !pacienteId" class="error-banner">⚠️ {{ mensajeError }}</div>

    <form *ngIf="!cargando && pacienteId" (ngSubmit)="actualizar()">
      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="perfil.nombre" name="nombre" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" [(ngModel)]="perfil.apellido" name="apellido" placeholder="Tu apellido">
        </div>
      </div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="perfil.correo" name="correo" placeholder="Tu correo">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" [(ngModel)]="perfil.telefono" name="telefono" placeholder="987654321">
      </div>

      <div class="error-banner" *ngIf="mensajeError">⚠️ {{ mensajeError }}</div>
      <div class="success-banner" *ngIf="mensajeExito">{{ mensajeExito }}</div>

      <button type="submit" class="btn-guardar" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : 'Actualizar Datos' }}
      </button>
    </form>
  </div>
</div>
